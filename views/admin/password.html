<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish - Admin Panel</title>
    <link rel="stylesheet" href="../../static/bootstrap-5.3.3-dist/css/bootstrap.min.css">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    html,
    body{
        width:100%;
        height:100%;
        overflow:hidden;

        font-family:'Poppins',sans-serif;

        display:flex;
        justify-content:center;
        align-items:center;

        color:white;

        background:
                radial-gradient(circle at top left,#3b82f6 0%,transparent 30%),
                radial-gradient(circle at bottom right,#8b5cf6 0%,transparent 25%),
                #0f172a;
    }

    /* ANIMATED BACKGROUND */

    body::before{

        content:"";

        position:fixed;
        inset:0;

        background:
                radial-gradient(circle at 20% 20%,
                rgba(59,130,246,.15),
                transparent 30%),

                radial-gradient(circle at 80% 80%,
                rgba(139,92,246,.15),
                transparent 30%);

        animation:floatGlow 10s infinite alternate;

        z-index:-2;
    }

    @keyframes floatGlow{

        from{
            transform:scale(1);
        }

        to{
            transform:scale(1.15);
        }

    }

    /* LOGIN BOX */

    .form-box{

        width:100%;
        max-width:450px;

        background:
                rgba(255,255,255,.05);

        backdrop-filter:blur(25px);

        border:
                1px solid rgba(255,255,255,.08);

        border-radius:30px;

        padding:45px 35px;

        box-shadow:
                0 20px 60px rgba(0,0,0,.45);

        position:relative;

        overflow:hidden;
    }

    /* GLOW BORDER */

    .form-box::before{

        content:"";

        position:absolute;

        inset:-2px;

        background:
                linear-gradient(
                        135deg,
                        #06b6d4,
                        #3b82f6,
                        #8b5cf6);

        z-index:-2;

        border-radius:32px;

        opacity:.25;
    }

    .form-box::after{

        content:"";

        position:absolute;

        inset:1px;

        background:
                rgba(15,23,42,.96);

        border-radius:28px;

        z-index:-1;
    }

    /* TITLE */

    .form-box h2{

        text-align:center;

        font-size:38px;

        font-weight:900;

        margin-bottom:30px;

        letter-spacing:2px;

        background:
                linear-gradient(
                        90deg,
                        #06b6d4,
                        #3b82f6,
                        #8b5cf6);

        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
    }

    /* LABEL */

    .form-label{

        color:#cbd5e1;

        font-size:14px;

        font-weight:600;

        margin-bottom:8px;
    }

    /* INPUT */

    .form-control{

        background:
                rgba(255,255,255,.05) !important;

        border:
                1px solid rgba(255,255,255,.08) !important;

        color:white !important;

        border-radius:15px;

        padding:15px 18px;

        font-size:15px;

        transition:.3s;
    }

    .form-control::placeholder{

        color:#64748b;
    }

    .form-control:focus{

        background:
                rgba(255,255,255,.08) !important;

        border-color:
                #3b82f6 !important;

        color:white !important;

        box-shadow:
                0 0 25px rgba(59,130,246,.25) !important;
    }

    /* BUTTON */

    .btn-submit{

        width:100%;

        border:none;

        border-radius:15px;

        padding:15px;

        font-size:15px;

        font-weight:700;

        margin-top:10px;

        color:white;

        background:
                linear-gradient(
                        135deg,
                        #06b6d4,
                        #3b82f6,
                        #8b5cf6);

        transition:.35s;
    }

    .btn-submit:hover{

        transform:
                translateY(-4px);

        box-shadow:
                0 15px 35px rgba(59,130,246,.35);
    }

    /* ERROR */

    .alert-custom{

        background:
                rgba(239,68,68,.08);

        border:
                1px solid rgba(239,68,68,.25);

        color:#fca5a5;

        border-radius:15px;

        padding:14px;

        text-align:center;

        margin-bottom:20px;

        font-size:14px;
    }

    /* LINK */

    .back-home{

        display:block;

        text-align:center;

        margin-top:25px;

        color:#94a3b8;

        text-decoration:none;

        transition:.3s;
    }

    .back-home:hover{

        color:#38bdf8;
    }

    /* LOGO AREA */

    .logo-area{

        text-align:center;

        margin-bottom:25px;
    }

    .logo-area h1{

        font-size:55px;

        font-weight:900;

        background:
                linear-gradient(
                        90deg,
                        #06b6d4,
                        #3b82f6,
                        #8b5cf6);

        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
    }

    .logo-area p{

        color:#94a3b8;

        margin-top:5px;
    }

    /* MOBILE */

    @media(max-width:768px){

        body{
            padding:20px;
        }

        .form-box{

            max-width:100%;

            padding:30px 25px;
        }

        .logo-area h1{

            font-size:40px;
        }

        .form-box h2{

            font-size:30px;
        }
    }
</style>

</head>
<body>

<div class="background-container">
    <div class="bg-image"></div>
</div>

<div class="form-box shadow-lg">
    <h2>Kirish</h2>

    {{if .Error}}
        <div class="alert-custom text-center">
            ⚠️ {{.Error}}
        </div>
    {{end}}

    <form action="/password" method="post">
        <div class="mb-3">
            <label for="firstname" class="form-label">Email yoki Login</label>
            <input type="text" class="form-control" id="firstname" name="firstname" autocomplete="username" placeholder="Login..." required>
        </div>

        <div class="mb-4">
            <label for="password" class="form-label">Parol</label>
            <input type="password" class="form-control" id="password" name="password" autocomplete="current-password" placeholder="*******" required>
        </div>

        <button type="submit" class="btn btn-submit w-100">Kirish ⚡</button>
    </form>

    <div class="text-center mt-4">
        <a href="/" style="color: #45a29e; text-decoration: none; font-size: 0.8rem;">
            🏠 Bosh sahifaga qaytish
        </a>
    </div>
</div>

</body>
</html>
